services:
  proxy:
    image: nginx:alpine
    container_name: paprika-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wordpress

  db:
    image: mariadb:11
    container_name: paprika-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - ./marinadb:/var/lib/mysql
      - ./db:/tmp/dump

  wordpress:
    image: wordpress:php8.2-apache
    container_name: paprika-wp
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      PAPRIKA_TG_BOT_TOKEN: "8762636838:AAFmye2iyme6GtMnm8wDbWhGeDORy5GwmF4"
      PAPRIKA_TG_CHAT_ID: "160078085"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('PAPRIKA_TG_BOT_TOKEN', '8762636838:AAFmye2iyme6GtMnm8wDbWhGeDORy5GwmF4');
        define('PAPRIKA_TG_CHAT_ID', '160078085');
    volumes:
      - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db

